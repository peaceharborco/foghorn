name: gitleaks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history — gitleaks scans every commit
      - name: Run gitleaks
        run: |
          # Pinned version + sha256 for supply-chain integrity
          GITLEAKS_VERSION="v8.30.1"
          # Release assets drop the tag's leading "v": gitleaks_8.30.1_..., not gitleaks_v8.30.1_...
          GITLEAKS_TAR="gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz"
          GITLEAKS_URL="https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/${GITLEAKS_TAR}"
          GITLEAKS_SHA="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -sSfL -o "${GITLEAKS_TAR}" "${GITLEAKS_URL}"
          echo "${GITLEAKS_SHA}  ${GITLEAKS_TAR}" | sha256sum -c -
          tar -xzf "${GITLEAKS_TAR}" gitleaks
          ./gitleaks git . --no-banner --redact --verbose
          rm -f "${GITLEAKS_TAR}" gitleaks
